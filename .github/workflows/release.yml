name: Release

# v* タグを push すると、macOS (Apple Silicon) 向けの .app を
# zip にして GitHub Releases に添付する
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package (Apple Silicon + Intel)
        run: |
          npm run package
          npm run package --arch=x64
      - name: Zip app bundles
        run: |
          for arch in arm64 x64; do
            (cd "release/はこにわ-darwin-$arch" && \
             ditto -c -k --sequesterRsrc --keepParent "はこにわ.app" \
               "../hakoniwa-${GITHUB_REF_NAME}-mac-$arch.zip")
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/hakoniwa-${GITHUB_REF_NAME}-mac-arm64.zip" \
            "release/hakoniwa-${GITHUB_REF_NAME}-mac-x64.zip" \
            --generate-notes \
            --notes "arm64 = Apple Silicon / x64 = Intel Mac。署名なしビルドのため、初回は右クリック→「開く」で起動してください。"
