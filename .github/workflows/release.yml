name: Release

# v* タグを push すると、macOS (Apple Silicon) 向けの .app を
# zip にして GitHub Releases に添付する
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # arm64
    env:
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm test
      - name: Package (Apple Silicon + Intel)
        run: |
          npm run package
          npm run package --arch=x64
      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_P12 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/tsuminiwa-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      - name: Sign app bundles
        if: env.APPLE_CERTIFICATE_P12 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          for arch in arm64 x64; do
            codesign --deep --force --options runtime --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" \
              "release/つみにわ-darwin-$arch/つみにわ.app"
            codesign --verify --deep --strict --verbose=2 \
              "release/つみにわ-darwin-$arch/つみにわ.app"
          done
          echo "SIGNED=true" >> "$GITHUB_ENV"
      - name: Notarize and staple app bundles
        if: env.SIGNED == 'true' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        run: |
          for arch in arm64 x64; do
            APP="release/つみにわ-darwin-$arch/つみにわ.app"
            SUBMISSION="$RUNNER_TEMP/tsuminiwa-$arch-notary.zip"
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$SUBMISSION"
            xcrun notarytool submit "$SUBMISSION" --wait \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            xcrun stapler staple "$APP"
            xcrun stapler validate "$APP"
          done
          echo "NOTARIZED=true" >> "$GITHUB_ENV"
      - name: Zip app bundles
        run: |
          for arch in arm64 x64; do
            (cd "release/つみにわ-darwin-$arch" && \
             ditto -c -k --sequesterRsrc --keepParent "つみにわ.app" \
               "../tsuminiwa-${GITHUB_REF_NAME}-mac-$arch.zip")
          done
      - name: Prepare release notes
        run: |
          if [ "$NOTARIZED" = "true" ]; then
            echo "arm64 = Apple Silicon / x64 = Intel Mac。Developer ID 署名・Apple 公証済みです。" > release-notes.txt
          else
            echo "arm64 = Apple Silicon / x64 = Intel Mac。署名なしビルドのため、初回は右クリック→「開く」で起動してください。" > release-notes.txt
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release/tsuminiwa-${GITHUB_REF_NAME}-mac-arm64.zip" \
            "release/tsuminiwa-${GITHUB_REF_NAME}-mac-x64.zip" \
            --generate-notes \
            --notes-file release-notes.txt
